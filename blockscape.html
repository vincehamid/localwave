<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blockscape</title>
<meta name="description" content="A small Minecraft-inspired browser voxel game.">
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#87ceeb;font-family:Inter,system-ui,sans-serif}canvas{display:block;width:100%;height:100%}.overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:linear-gradient(#14243466,#071018dc);backdrop-filter:blur(6px)}.panel{width:min(620px,100%);padding:32px;border:1px solid #ffffff2b;border-radius:18px;background:#111a21eb;color:white;text-align:center;box-shadow:0 25px 80px #0008}.eyebrow{font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:#d7ff7d}h1{margin:8px 0 12px;font-size:clamp(48px,9vw,88px);line-height:.9;letter-spacing:-.07em}p{margin:0 auto 22px;max-width:500px;color:#d8e2e7;line-height:1.5}.buttons{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}button{min-width:170px;padding:14px 22px;border:0;border-radius:10px;background:#d7ff7d;color:#14200e;font:inherit;font-weight:900;cursor:pointer}button.alt{background:#ffffff14;color:white;border:1px solid #ffffff2b}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:25px;text-align:left;color:#b8c6cc;font-size:14px}.controls span{padding:10px 12px;border-radius:8px;background:#ffffff0d}kbd{display:inline-block;min-width:62px;color:white;font:inherit;font-weight:850}.hidden{display:none!important}#hud{position:fixed;inset:0;z-index:10;pointer-events:none}#cross{position:absolute;left:50%;top:50%;width:18px;height:18px;transform:translate(-50%,-50%);filter:drop-shadow(0 1px 2px #000)}#cross:before,#cross:after{content:"";position:absolute;background:white}#cross:before{left:1px;top:8px;width:16px;height:2px}#cross:after{left:8px;top:1px;width:2px;height:16px}#msg{position:absolute;top:18px;left:50%;transform:translateX(-50%);padding:8px 12px;border-radius:8px;background:#0009;color:white;opacity:0;transition:.15s}#msg.show{opacity:1}#bar{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);display:flex;gap:6px;padding:6px;border-radius:12px;background:#0008}.slot{position:relative;display:grid;place-items:center;width:56px;height:56px;border:2px solid #ffffff30;border-radius:8px;background:#ffffff12}.slot.sel{border-color:white;transform:translateY(-4px)}.swatch{width:30px;height:30px;border:2px solid #ffffff35;box-shadow:inset -5px -5px #0002}.num{position:absolute;left:5px;top:3px;color:white;font-size:11px;font-weight:900}@media(max-width:620px){.controls{grid-template-columns:1fr}.panel{padding:25px 18px}}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.185.0/build/three.module.js"}}</script>
</head>
<body>
<canvas id="game"></canvas>
<div id="start" class="overlay"><div class="panel"><div class="eyebrow">Browser voxel sandbox</div><h1>BLOCKSCAPE</h1><p>Explore a generated world, break blocks, and build anything you want. Your changes save automatically in this browser.</p><div class="buttons"><button id="play">Play</button><button id="reset" class="alt">Reset world</button></div><div class="controls"><span><kbd>W A S D</kbd>Move</span><span><kbd>Mouse</kbd>Look</span><span><kbd>Space</kbd>Jump</span><span><kbd>Shift</kbd>Sprint</span><span><kbd>Left click</kbd>Break</span><span><kbd>Right click</kbd>Place</span><span><kbd>1–5</kbd>Select block</span><span><kbd>Esc</kbd>Pause</span></div></div></div>
<div id="hud" class="hidden"><div id="cross"></div><div id="msg"></div><div id="bar"></div></div>
<script type="module">
import * as THREE from 'three';
const $=s=>document.querySelector(s),canvas=$('#game'),start=$('#start'),hud=$('#hud'),bar=$('#bar'),msg=$('#msg');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x8ed6ff);scene.fog=new THREE.Fog(0x8ed6ff,25,65);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.05,100),renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);renderer.outputColorSpace=THREE.SRGBColorSpace;
scene.add(new THREE.HemisphereLight(0xc9eeff,0x5b4b37,2.2));const sun=new THREE.DirectionalLight(0xfff1c8,2.4);sun.position.set(-18,28,12);scene.add(sun);
const types={grass:{label:'Grass',color:0x67a747,sw:'#67a747'},dirt:{label:'Dirt',color:0x865f40,sw:'#865f40'},stone:{label:'Stone',color:0x858b90,sw:'#858b90'},wood:{label:'Wood',color:0x8c6138,sw:'#8c6138'},leaves:{label:'Leaves',color:0x3f8041,sw:'#3f8041'}},names=Object.keys(types);let selected='grass';
const geo=new THREE.BoxGeometry(1,1,1),mats={};for(const [k,v] of Object.entries(types))mats[k]=new THREE.MeshLambertMaterial({color:v.color,transparent:k==='leaves',opacity:k==='leaves'?.9:1});
const blocks=new Map(),group=new THREE.Group();scene.add(group);const key=(x,y,z)=>`${x},${y},${z}`,SAVE='blockscape-save-v2';let changes={};try{changes=JSON.parse(localStorage.getItem(SAVE)||'{}')}catch{}
function add(x,y,z,t='dirt',record=false){const k=key(x,y,z);if(blocks.has(k))return;blocks.set(k,{x,y,z,t});if(record){changes[k]=t;localStorage.setItem(SAVE,JSON.stringify(changes))}rebuild()}
function del(x,y,z,record=false){const k=key(x,y,z);if(!blocks.has(k))return;blocks.delete(k);if(record){changes[k]=null;localStorage.setItem(SAVE,JSON.stringify(changes))}rebuild()}
let generated=false;function h(x,z){return Math.max(1,Math.floor(3+Math.sin(x*.25)*1.25+Math.cos(z*.22)*1.15+Math.sin((x+z)*.45)*.45))}function rnd(x,z){const n=Math.sin(x*127.1+z*311.7)*43758.5453;return n-Math.floor(n)}
function tree(x,y,z){for(let i=1;i<5;i++)blocks.set(key(x,y+i,z),{x,y:y+i,z,t:'wood'});for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++)for(let dy=-1;dy<=1;dy++)if(Math.abs(dx)+Math.abs(dz)+Math.abs(dy)*.6<3.3&&!(dx===0&&dz===0&&dy<1)){const X=x+dx,Y=y+4+dy,Z=z+dz;blocks.set(key(X,Y,Z),{x:X,y:Y,z:Z,t:'leaves'})}}
function world(){for(let x=-14;x<=14;x++)for(let z=-14;z<=14;z++){const H=h(x,z);for(let y=-2;y<=H;y++){const t=y===H?'grass':y>=H-2?'dirt':'stone';blocks.set(key(x,y,z),{x,y,z,t})}}for(let x=-11;x<=11;x++)for(let z=-11;z<=11;z++)if((Math.abs(x)>3||Math.abs(z)>3)&&rnd(x*5+2,z*7-4)>.973)tree(x,h(x,z),z);for(const [k,t] of Object.entries(changes)){const [x,y,z]=k.split(',').map(Number);blocks.delete(k);if(t&&types[t])blocks.set(k,{x,y,z,t})}generated=true;rebuild()}
const meshes=new Map(),keysByType=new Map(),mat4=new THREE.Matrix4();function rebuild(){if(!generated)return;for(const m of meshes.values())group.remove(m);meshes.clear();keysByType.clear();for(const t of names){const a=[...blocks.entries()].filter(([,b])=>b.t===t);if(!a.length)continue;const mesh=new THREE.InstancedMesh(geo,mats[t],a.length),ks=[];a.forEach(([k,b],i)=>{mat4.makeTranslation(b.x,b.y,b.z);mesh.setMatrixAt(i,mat4);ks.push(k)});mesh.instanceMatrix.needsUpdate=true;mesh.computeBoundingSphere();mesh.userData.t=t;group.add(mesh);meshes.set(t,mesh);keysByType.set(t,ks)}}world();
const outline=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1.012,1.012,1.012)),new THREE.LineBasicMaterial({color:0xffffff}));outline.visible=false;scene.add(outline);
const player={p:new THREE.Vector3(0,h(0,0)+.51,0),v:new THREE.Vector3(),r:.31,height:1.8,eye:1.62,ground:false};let yaw=0,pitch=0,locked=false,target=null,timer;
function cam(){camera.position.set(player.p.x,player.p.y+player.eye,player.p.z);camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch}cam();
function flash(s,d=1100){msg.textContent=s;msg.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>msg.classList.remove('show'),d)}
function hotbar(){bar.innerHTML='';names.forEach((t,i)=>{const e=document.createElement('div');e.className='slot'+(t===selected?' sel':'');e.innerHTML=`<span class="num">${i+1}</span><span class="swatch" style="background:${types[t].sw}"></span>`;bar.append(e)})}hotbar();
const keys=new Set();addEventListener('keydown',e=>{keys.add(e.code);if(e.code==='Space')e.preventDefault();const n=+e.key;if(n>=1&&n<=5){selected=names[n-1];hotbar();flash(types[selected].label+' selected')}});addEventListener('keyup',e=>keys.delete(e.code));
$('#play').onclick=()=>canvas.requestPointerLock();$('#reset').onclick=()=>{if(confirm('Reset all placed and removed blocks?')){localStorage.removeItem(SAVE);location.reload()}};canvas.onclick=()=>{if(!locked&&start.classList.contains('hidden'))canvas.requestPointerLock()};canvas.oncontextmenu=e=>e.preventDefault();
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===canvas;if(locked){start.classList.add('hidden');hud.classList.remove('hidden');msg.classList.remove('show')}else if(start.classList.contains('hidden')){hud.classList.remove('hidden');flash('Paused — click to resume',99999)}});document.addEventListener('mousemove',e=>{if(!locked)return;yaw-=e.movementX*.0022;pitch=THREE.MathUtils.clamp(pitch-e.movementY*.0022,-1.54,1.54)});
const ray=new THREE.Raycaster();ray.far=6;function aim(){ray.setFromCamera(new THREE.Vector2(),camera);const hit=ray.intersectObjects([...meshes.values()],false)[0];if(!hit||hit.instanceId===undefined){target=null;outline.visible=false;return}const t=hit.object.userData.t,k=keysByType.get(t)[hit.instanceId],b=blocks.get(k);if(!b)return;target={hit,b};outline.position.set(b.x,b.y,b.z);outline.visible=true}
function overlap(x,y,z){return player.p.x+player.r>x-.5&&player.p.x-player.r<x+.5&&player.p.y+player.height>y-.5&&player.p.y<y+.5&&player.p.z+player.r>z-.5&&player.p.z-player.r<z+.5}
canvas.addEventListener('mousedown',e=>{if(!locked||!target)return;const b=target.b;if(e.button===0){del(b.x,b.y,b.z,true);target=null}else if(e.button===2&&target.hit.face){const n=target.hit.face.normal,x=b.x+Math.round(n.x),y=b.y+Math.round(n.y),z=b.z+Math.round(n.z);if(!blocks.has(key(x,y,z))&&!overlap(x,y,z)){add(x,y,z,selected,true);target=null}}});
function collide(p){const ep=.001,minX=p.x-player.r+ep,maxX=p.x+player.r-ep,minY=p.y+ep,maxY=p.y+player.height-ep,minZ=p.z-player.r+ep,maxZ=p.z+player.r-ep;for(let x=Math.floor(minX+.5);x<=Math.floor(maxX+.5);x++)for(let y=Math.floor(minY+.5);y<=Math.floor(maxY+.5);y++)for(let z=Math.floor(minZ+.5);z<=Math.floor(maxZ+.5);z++)if(blocks.has(key(x,y,z)))return true;return false}
function axis(a,d){const steps=Math.max(1,Math.ceil(Math.abs(d)/.08)),s=d/steps;for(let i=0;i<steps;i++){const p=player.p.clone();p[a]+=s;if(collide(p))return true;player.p.copy(p)}return false}
function update(dt){if(!locked){player.v.x=player.v.z=0;return}const f=+keys.has('KeyW')-+keys.has('KeyS'),r=+keys.has('KeyD')-+keys.has('KeyA'),len=Math.hypot(f,r)||1,s=(keys.has('ShiftLeft')||keys.has('ShiftRight'))?7.2:4.6,fx=-Math.sin(yaw),fz=-Math.cos(yaw),rx=Math.cos(yaw),rz=-Math.sin(yaw),smooth=1-Math.exp(-(player.ground?18:7)*dt);player.v.x=THREE.MathUtils.lerp(player.v.x,(fx*f+rx*r)/len*s,smooth);player.v.z=THREE.MathUtils.lerp(player.v.z,(fz*f+rz*r)/len*s,smooth);if(keys.has('Space')&&player.ground){player.v.y=7.4;player.ground=false}player.v.y=Math.max(player.v.y-20*dt,-28);if(axis('x',player.v.x*dt))player.v.x=0;if(axis('z',player.v.z*dt))player.v.z=0;player.ground=false;const down=player.v.y<=0;if(axis('y',player.v.y*dt)){if(down)player.ground=true;player.v.y=0}if(player.p.y<-15){player.p.set(0,h(0,0)+3,0);player.v.set(0,0,0);flash('Respawned')}}
const clock=new THREE.Clock();function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),.05);update(dt);cam();aim();renderer.render(scene,camera)}loop();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2))});
</script>
</body>
</html>
